name: Deploy to PROD (altareen.com)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Create GA4 credentials file
        run: echo '${{ secrets.GA4_KEY_JSON }}' > ga4-key.json

      - name: Build
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/ga4-key.json
        run: npm run build

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Deploy via rsync
        env:
          HOST: ${{ secrets.PROD_SSH_HOST }}
          USER: ${{ secrets.PROD_SSH_USER }}
          DEST: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "mkdir -p '$DEST'"

          rsync -rz --delete --no-times --no-perms --no-owner --no-group \
            --exclude 'cgi-bin/' \
            --exclude 'node_modules/' \
            --exclude '.feedback-store.json' \
            -e "ssh -o StrictHostKeyChecking=no" \
            dist/ "$USER@$HOST:$DEST/"

          rsync -az --no-owner --no-group \
            -e "ssh -o StrictHostKeyChecking=no" \
            package.json package-lock.json "$USER@$HOST:$DEST/"

      - name: Write Prodforce runtime env
        env:
          HOST: ${{ secrets.PROD_SSH_HOST }}
          USER: ${{ secrets.PROD_SSH_USER }}
          DEST: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_RUNTIME_ENV: ${{ secrets.PROD_RUNTIME_ENV }}
          PROD_GROQ_API_KEY: ${{ secrets.PROD_GROQ_API_KEY }}
          SHARED_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PROD_ANTHROPIC_API_KEY: ${{ secrets.PROD_ANTHROPIC_API_KEY }}
          SHARED_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROD_PROVIDER: ${{ secrets.PROD_PRODFORCE_LLM_PROVIDER }}
        run: |
          set -e
          GROQ_KEY="${PROD_GROQ_API_KEY:-$SHARED_GROQ_API_KEY}"
          ANTHROPIC_KEY="${PROD_ANTHROPIC_API_KEY:-$SHARED_ANTHROPIC_API_KEY}"
          PROVIDER="${PROD_PROVIDER:-groq}"

          if [ -n "$PROD_RUNTIME_ENV" ]; then
            printf '%s\n' "$PROD_RUNTIME_ENV" > .env.prodforce
          else
            if [ -z "$GROQ_KEY" ] && [ -z "$ANTHROPIC_KEY" ]; then
              echo "Missing Prodforce runtime secret. Set PROD_RUNTIME_ENV or PROD_GROQ_API_KEY / PROD_ANTHROPIC_API_KEY in GitHub Actions secrets."
              exit 1
            fi

            {
              printf 'PRODFORCE_LLM_PROVIDER=%s\n' "$PROVIDER"
              printf 'GROQ_API_KEY=%s\n' "$GROQ_KEY"
              printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_KEY"
            } > .env.prodforce
          fi

          scp -o StrictHostKeyChecking=no .env.prodforce "$USER@$HOST:$DEST/.env.prodforce"
          rm -f .env.prodforce

      - name: Install production deps + restart service
        env:
          HOST: ${{ secrets.PROD_SSH_HOST }}
          USER: ${{ secrets.PROD_SSH_USER }}
          DEST: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "
            set -e
            cd '$DEST'
            npm ci --omit=dev
            sudo systemctl restart altareen-prod
          "
