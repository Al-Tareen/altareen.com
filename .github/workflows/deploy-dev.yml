name: Deploy to DEV (dev.altareen.com)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}

      - name: Deploy build + package files (scp)
        env:
          HOST: ${{ secrets.DEV_SSH_HOST }}
          USER: ${{ secrets.DEV_SSH_USER }}
          DEST: /home/admin/domains/dev.altareen.com/public_html
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "mkdir -p '$DEST'"

          # Upload dist contents (client/server/etc.)
          scp -o StrictHostKeyChecking=no -r dist/* "$USER@$HOST:$DEST/"

          # Upload package manifests so we can install runtime deps on the VPS
          scp -o StrictHostKeyChecking=no package.json package-lock.json "$USER@$HOST:$DEST/"

      - name: Install production deps (ssh)
        env:
          HOST: ${{ secrets.DEV_SSH_HOST }}
          USER: ${{ secrets.DEV_SSH_USER }}
          DEST: /home/admin/domains/dev.altareen.com/public_html
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "
            set -e
            cd '$DEST'
            npm ci --omit=dev
          "