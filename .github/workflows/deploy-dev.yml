name: Deploy to DEV (dev.altareen.com)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Create GA4 credentials file
        run: echo '${{ secrets.GA4_KEY_JSON }}' > ga4-key.json

      - name: Build
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/ga4-key.json
        run: npm run build

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}

      - name: Deploy via rsync
        env:
          HOST: ${{ secrets.DEV_SSH_HOST }}
          USER: ${{ secrets.DEV_SSH_USER }}
          DEST: ${{ secrets.DEV_DEPLOY_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "mkdir -p '$DEST'"

          rsync -rz --delete --no-times --no-perms --no-owner --no-group \
            --exclude 'cgi-bin/' \
            --exclude 'node_modules/' \
            --exclude '.feedback-store.json' \
            -e "ssh -o StrictHostKeyChecking=no" \
            dist/ "$USER@$HOST:$DEST/"

          rsync -az --no-owner --no-group \
            -e "ssh -o StrictHostKeyChecking=no" \
            package.json package-lock.json "$USER@$HOST:$DEST/"

      - name: Install production deps + restart service
        env:
          HOST: ${{ secrets.DEV_SSH_HOST }}
          USER: ${{ secrets.DEV_SSH_USER }}
          DEST: ${{ secrets.DEV_DEPLOY_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "
            set -e
            cd '$DEST'
            npm ci --omit=dev
            sudo systemctl restart altareen-dev
          "